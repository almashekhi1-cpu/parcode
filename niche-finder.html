<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>باحث النيش - يوتيوب العربي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111827;
      --sidebar-bg: #1f2937;
      --card-bg: #1f2937;
      --border: #374151;
      --purple: #7c3aed;
      --purple-light: #8b5cf6;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --tag-bg: #374151;
      --input-bg: #111827;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
    .logo-badge {
      background: var(--purple);
      color: white;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 700;
    }

    .create-btn {
      margin: 14px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .create-btn:hover { background: var(--border); }

    .nav-section { padding: 8px 0; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 0;
      transition: background 0.15s, color 0.15s;
      font-size: 0.88rem;
      text-decoration: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active {
      background: rgba(124, 58, 237, 0.15);
      color: var(--purple-light);
      border-right: 3px solid var(--purple-light);
    }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-bottom {
      border-top: 1px solid var(--border);
      padding: 8px 0;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .credits-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }
    .buy-btn {
      background: var(--purple);
      border: none;
      color: white;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .icon-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 34px; height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    /* ===== CONTENT ===== */
    .content { padding: 28px 24px; flex: 1; overflow-y: auto; }

    .page-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .page-heading h1 { font-size: 1.4rem; font-weight: 700; }
    .heading-icon {
      background: var(--border);
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    /* ===== SEARCH BAR ===== */
    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-icon-inside {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 15px;
    }
    .search-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 36px 9px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      direction: rtl;
    }
    .search-input:focus { outline: none; border-color: var(--purple-light); }
    .search-input::placeholder { color: var(--text-dim); }

    .sort-select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      min-width: 130px;
    }
    .sort-select:focus { outline: none; }

    .filter-toggle-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center;
    }

    .type-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .type-btn:hover, .type-btn.active {
      background: rgba(124,58,237,0.2);
      border-color: var(--purple-light);
      color: var(--purple-light);
    }

    .search-go-btn {
      background: var(--purple);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 9px 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .search-go-btn:hover { opacity: 0.9; }
    .search-go-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== FILTER PANEL ===== */
    .filter-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 14px;
      display: none;
    }
    .filter-panel.open { display: block; }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .filter-field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .filter-field select, .filter-field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.83rem;
    }
    .filter-field select:focus, .filter-field input:focus { outline: none; border-color: var(--purple-light); }

    /* ===== ACTIVE FILTERS TAGS ===== */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      min-height: 10px;
    }
    .filter-tag {
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.3);
      color: #c4b5fd;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-tag-x {
      cursor: pointer;
      opacity: 0.7;
      font-size: 12px;
    }
    .filter-tag-x:hover { opacity: 1; }

    /* ===== RESULTS HEADER ===== */
    .results-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-info span { color: var(--text-muted); font-size: 0.85rem; }
    .powered-by {
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex; align-items: center; gap: 5px;
    }

    /* ===== CARDS GRID ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .channel-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: border-color 0.2s;
      animation: fadeUp 0.35s ease both;
    }
    .channel-card:hover { border-color: rgba(124,58,237,0.5); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-channel {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .channel-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: white;
    }
    .channel-info { min-width: 0; }
    .channel-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .channel-handle { color: var(--text-dim); font-size: 0.78rem; margin-top: 2px; }

    .bookmark-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 17px;
      padding: 2px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .bookmark-btn:hover { color: var(--purple-light); }

    /* stats row */
    .card-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 0.78rem;
    }
    .stat-item .si { font-size: 13px; }
    .stat-up { color: var(--green); }
    .stat-down { color: var(--red); }
    .stat-dollar { color: var(--green); font-size: 16px; font-weight: 700; }

    /* niches */
    .card-niches-label { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 6px; }
    .niches-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .niche-tag {
      background: var(--tag-bg);
      color: var(--text-muted);
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 0.75rem;
    }

    /* recent videos */
    .recent-label { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 8px; }
    .videos-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .video-thumb {
      border-radius: 7px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .video-thumb-bg {
      position: absolute; inset: 0;
      opacity: 0.15;
    }
    .video-thumb-emoji { position: relative; z-index: 1; }
    .video-stat {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 4px;
      text-align: center;
    }
    .video-stat strong { color: var(--text-muted); }

    /* card actions */
    .card-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 7px;
      padding: 8px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.15s;
    }
    .action-btn:hover { background: var(--border); color: var(--text); }
    .action-btn.primary {
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.35);
      color: var(--purple-light);
    }
    .action-btn.primary:hover {
      background: rgba(124,58,237,0.25);
    }

    /* ===== STATES ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      grid-column: 1/-1;
    }
    .empty-state .es-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 8px; }
    .empty-state p { font-size: 0.88rem; }

    .loading-overlay {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
    }
    .loading-overlay.show { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--purple-light);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { color: var(--text-muted); font-size: 0.88rem; }

    .error-banner {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .error-banner.show { display: block; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🎯</div>
    <span class="logo-text">نيش يوتيوب</span>
    <span class="logo-badge">AI</span>
  </div>

  <nav class="nav-section">
    <a class="nav-item" href="#">
      <span class="nav-icon">📊</span> لوحة التحكم
    </a>
    <a class="nav-item active" href="/niche-finder">
      <span class="nav-icon">🎯</span> باحث النيش
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">📁</span> سجل المشاريع
    </a>
  </nav>

  <div class="sidebar-bottom">
    <a class="nav-item" href="#">
      <span class="nav-icon">🎓</span> الدورات
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">🤝</span> الشراكة
    </a>
    <a class="nav-item" href="/admin">
      <span class="nav-icon">⚙️</span> الإدارة
    </a>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div></div>
    <div class="topbar-right">
      <button class="buy-btn">شراء كريدت</button>
      <button class="credits-btn">💎 1,000 كريدت</button>
      <button class="icon-btn">🔔</button>
      <button class="icon-btn">⚙️</button>
      <button class="icon-btn">👤</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="page-heading">
      <h1>اكتشاف النيش</h1>
      <span class="heading-icon">▶</span>
    </div>

    <!-- SEARCH ROW -->
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon-inside">🔍</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="ابحث عن نيش أو موضوع... (مثال: تكنولوجيا، طبخ، مال)"/>
      </div>

      <select class="sort-select" id="sortSelect">
        <option value="">ترتيب حسب</option>
        <option value="competition-low">المنافسة: منخفضة</option>
        <option value="revenue-high">الربح: الأعلى</option>
        <option value="views-high">المشاهدات: الأعلى</option>
      </select>

      <button class="filter-toggle-btn" onclick="toggleFilters()" title="الفلاتر">⚙️</button>

      <button class="type-btn" id="btn-faceless" onclick="toggleType('faceless')">بدون وجه</button>
      <button class="type-btn" id="btn-educational" onclick="toggleType('educational')">تعليمي</button>

      <button class="icon-btn">🔖</button>

      <button class="search-go-btn" id="goBtn" onclick="findNiches()">
        <span>🔍</span> بحث
      </button>
    </div>

    <!-- FILTER PANEL -->
    <div class="filter-panel" id="filterPanel">
      <div class="filter-grid">
        <div class="filter-field">
          <label>نوع المحتوى</label>
          <select id="contentType">
            <option value="any">أي نوع</option>
            <option value="educational">تعليمي</option>
            <option value="entertainment">ترفيهي</option>
            <option value="reviews">مراجعات</option>
            <option value="tutorials">شروحات تقنية</option>
            <option value="motivation">تحفيزي</option>
            <option value="news">أخبار وتحليل</option>
            <option value="faceless">قنوات بدون وجه</option>
          </select>
        </div>
        <div class="filter-field">
          <label>مستوى المنافسة</label>
          <select id="competition">
            <option value="any">أي مستوى</option>
            <option value="low">منخفض فقط</option>
            <option value="medium">متوسط</option>
            <option value="low-medium">منخفض إلى متوسط</option>
          </select>
        </div>
        <div class="filter-field">
          <label>اللغة المستهدفة</label>
          <select id="language">
            <option value="arabic">عربي</option>
            <option value="gulf">خليجي</option>
            <option value="egyptian">مصري</option>
            <option value="levant">شامي</option>
            <option value="english">إنجليزي</option>
          </select>
        </div>
        <div class="filter-field">
          <label>معلومات إضافية</label>
          <input type="text" id="extra" placeholder="مثال: ميزانية محدودة، بدون كاميرا..."/>
        </div>
      </div>
    </div>

    <!-- ACTIVE FILTER TAGS -->
    <div class="active-filters" id="activeTags"></div>

    <!-- ERROR -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- RESULTS INFO -->
    <div class="results-info" id="resultsInfo" style="display:none;">
      <span id="resultsCount"></span>
      <span class="powered-by">مدعوم بالذكاء الاصطناعي ✨</span>
    </div>

    <!-- CARDS -->
    <div class="cards-grid" id="cardsGrid">
      <div class="empty-state">
        <div class="es-icon">🎯</div>
        <h3>ابدأ بالبحث عن نيشك</h3>
        <p>اكتب اهتماماتك في خانة البحث واضغط "بحث"<br/>وسيقترح الذكاء الاصطناعي أفضل النيشات للسوق العربي</p>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<script>
  // ===== STATE =====
  let activeTypes = [];
  let activeFilterTags = [];
  let filtersOpen = false;

  const COLORS = ['#7c3aed','#0891b2','#059669','#dc2626','#d97706','#7c3aed','#db2777','#0284c7'];
  const EMOJIS = ['🎬','📱','💡','🌟','🔥','💰','📊','🎓','🎮','🍳','✈️','💪','📰','🎵','🏆','🤖'];

  // ===== FILTER TOGGLE =====
  function toggleFilters() {
    filtersOpen = !filtersOpen;
    document.getElementById('filterPanel').classList.toggle('open', filtersOpen);
  }

  function toggleType(type) {
    const btn = document.getElementById('btn-' + type);
    const idx = activeTypes.indexOf(type);
    if (idx === -1) { activeTypes.push(type); btn.classList.add('active'); }
    else { activeTypes.splice(idx, 1); btn.classList.remove('active'); }
  }

  // ===== BUILD ACTIVE TAGS =====
  function buildActiveTags() {
    const tagsEl = document.getElementById('activeTags');
    const tags = [];

    const contentType = document.getElementById('contentType').value;
    const competition = document.getElementById('competition').value;
    const language = document.getElementById('language').value;

    const ctMap = { educational:'نوع المحتوى: تعليمي', entertainment:'نوع المحتوى: ترفيهي',
      reviews:'نوع المحتوى: مراجعات', tutorials:'نوع المحتوى: شروحات', motivation:'نوع المحتوى: تحفيزي',
      news:'نوع المحتوى: أخبار', faceless:'نوع المحتوى: بدون وجه' };
    const compMap = { low:'المنافسة: منخفضة', medium:'المنافسة: متوسطة', 'low-medium':'المنافسة: منخفضة-متوسطة' };
    const langMap = { arabic:'اللغة: عربي', gulf:'اللغة: خليجي', egyptian:'اللغة: مصري', levant:'اللغة: شامي', english:'اللغة: إنجليزي' };

    if (ctMap[contentType]) tags.push(ctMap[contentType]);
    if (compMap[competition]) tags.push(compMap[competition]);
    if (langMap[language]) tags.push(langMap[language]);
    if (activeTypes.includes('faceless')) tags.push('قنوات بدون وجه');
    if (activeTypes.includes('educational')) tags.push('تعليمي');

    tagsEl.innerHTML = tags.map(t => `
      <span class="filter-tag">
        ${t}
        <span class="filter-tag-x" onclick="removeTag('${t}')">✕</span>
      </span>`).join('');
  }

  function removeTag(tag) {
    // simple: just rebuild without that tag — for now resets filter
    buildActiveTags();
  }

  // ===== MAIN SEARCH =====
  async function findNiches() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) { showError('الرجاء إدخال موضوع أو نيش للبحث عنه'); return; }

    hideError();
    buildActiveTags();
    setLoading(true);

    const contentType = document.getElementById('contentType').value;
    const competition = document.getElementById('competition').value;
    const language = document.getElementById('language').value;
    const extra = document.getElementById('extra').value.trim();

    try {
      const res = await fetch('/api/niche-finder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ interest: query, contentType, competition, language, extra, types: activeTypes })
      });
      const data = await res.json();
      if (!data.success) { showError(data.message || 'حدث خطأ، حاول مرة أخرى'); return; }
      renderCards(data.niches);
    } catch {
      showError('تعذر الاتصال بالخادم');
    } finally {
      setLoading(false);
    }
  }

  // ===== RENDER =====
  function renderCards(niches) {
    const grid = document.getElementById('cardsGrid');
    const info = document.getElementById('resultsInfo');
    document.getElementById('resultsCount').textContent = `${niches.length} نيشات مقترحة`;
    info.style.display = 'flex';

    grid.innerHTML = niches.map((n, i) => {
      const color = COLORS[i % COLORS.length];
      const emoji1 = EMOJIS[i % EMOJIS.length];
      const emoji2 = EMOJIS[(i + 3) % EMOJIS.length];
      const initials = (n.name || '؟').charAt(0);

      const compIcon = n.competition === 'منخفض' ? '🟢' : n.competition === 'متوسط' ? '🟡' : '🔴';
      const revIcon  = n.revenue === 'عالي' ? '💰' : n.revenue === 'متوسط' ? '💵' : '💸';

      const subEst  = n.competition === 'منخفض' ? '+5K' : n.competition === 'متوسط' ? '+25K' : '+100K';
      const viewEst = n.competition === 'منخفض' ? '8,000' : n.competition === 'متوسط' ? '35,000' : '120,000';
      const period  = '3 أشهر';

      const nicheTags = (n.keywords || []).slice(0, 5).map(k =>
        `<span class="niche-tag">${k}</span>`).join('');

      const ideas = n.ideas || [];
      const idea1 = ideas[0] || 'فكرة محتوى 1';
      const idea2 = ideas[1] || 'فكرة محتوى 2';

      return `
      <div class="channel-card" style="animation-delay:${i*0.07}s">
        <div class="card-top">
          <div class="card-channel">
            <div class="channel-avatar" style="background:linear-gradient(135deg,${color},${COLORS[(i+2)%COLORS.length]})">${initials}</div>
            <div class="channel-info">
              <div class="channel-name">${n.name}</div>
              <div class="channel-handle">@${slugify(n.name)}</div>
            </div>
          </div>
          <button class="bookmark-btn">🔖</button>
        </div>

        <div class="card-stats">
          <span class="stat-item"><span class="si">👥</span> ${subEst}</span>
          <span class="stat-item stat-down"><span class="si">👁️</span> ${viewEst}</span>
          <span class="stat-item"><span class="si">🎬</span> ${(i+3)*7}</span>
          <span class="stat-item"><span class="si">📅</span> ${period}</span>
          ${n.revenue === 'عالي' ? '<span class="stat-dollar">$</span>' : ''}
        </div>

        <div class="card-niches-label">النيشات: ${compIcon} ${n.competition} · ${revIcon} ربح ${n.revenue}</div>
        <div class="niches-wrap">${nicheTags}</div>

        ${ideas.length ? `
        <div class="recent-label">أفكار محتوى مقترحة:</div>
        <div class="videos-row">
          <div>
            <div class="video-thumb">
              <div class="video-thumb-bg" style="background:${color}"></div>
              <span class="video-thumb-emoji">${emoji1}</span>
            </div>
            <div class="video-stat"><strong>حديث</strong> · ${idea1.substring(0,28)}${idea1.length>28?'…':''}</div>
          </div>
          <div>
            <div class="video-thumb">
              <div class="video-thumb-bg" style="background:${COLORS[(i+2)%COLORS.length]}"></div>
              <span class="video-thumb-emoji">${emoji2}</span>
            </div>
            <div class="video-stat"><strong>الأفضل</strong> · ${idea2.substring(0,28)}${idea2.length>28?'…':''}</div>
          </div>
        </div>
        ` : ''}

        <hr class="card-divider"/>
        <div class="card-actions">
          <button class="action-btn" onclick="showSimilar('${n.name}')">🔄 نيشات مشابهة</button>
          <button class="action-btn primary" onclick="copyStyle('${n.name}')">📋 استخدم هذا النيش</button>
        </div>
      </div>`;
    }).join('');
  }

  function slugify(name) {
    return name.replace(/\s+/g, '').replace(/[^\u0621-\u064Aa-zA-Z0-9]/g, '') + 'Channel';
  }

  function showSimilar(name) {
    document.getElementById('searchInput').value = name;
    findNiches();
  }
  function copyStyle(name) {
    navigator.clipboard?.writeText(name).catch(()=>{});
    alert('تم نسخ اسم النيش: ' + name);
  }

  // ===== HELPERS =====
  function setLoading(on) {
    const grid = document.getElementById('cardsGrid');
    document.getElementById('goBtn').disabled = on;
    if (on) {
      grid.innerHTML = `<div class="loading-overlay show">
        <div class="spinner"></div>
        <p>الذكاء الاصطناعي يحلل النيشات المناسبة للسوق العربي...</p>
      </div>`;
      document.getElementById('resultsInfo').style.display = 'none';
    }
  }
  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = '⚠️ ' + msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('errorBanner').classList.remove('show');
  }

  // Enter key
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') findNiches();
  });
</script>
</body>
</html>
